<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroMap</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #map { height: 85vh; width: 100vw; }
        .controls { height: 15vh; display: flex; flex-direction: column; padding: 10px; gap: 5px; background: #f0f0f0; }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .btn-save { background: #28a745; }
        .btn-clear { background: #dc3545; }
    </style>
</head>
<body>

    <div class="controls">
        <input type="text" id="fieldName" placeholder="Название поля...">
        <div style="display: flex; gap: 5px;">
            <button class="btn-save" style="flex: 2;" onclick="saveField()">💾 Сохранить</button>
            <button class="btn-clear" style="flex: 1;" onclick="location.reload()">❌</button>
        </div>
    </div>
    <div id="map"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Центр карты — Никополь
        const map = L.map('map').setView([47.5746, 34.4396], 15);

        // Используем комбинацию спутника и карты для лучшей видимости
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        }).addTo(map);

        let points = [];
        let poly = null;

        map.on('click', (e) => {
            points.push([e.latlng.lat, e.latlng.lng]);
            if (poly) map.removeLayer(poly);
            poly = L.polygon(points, {color: 'yellow', weight: 3}).addTo(map);
        });

        function saveField() {
            const name = document.getElementById('fieldName').value.trim();
            if (!name) return alert('Введите название!');
            if (points.length < 3) return alert('Поставьте минимум 3 точки!');

            // Отправляем данные в бота
            tg.sendData(JSON.stringify({
                name: name,
                points: points
            }));
            tg.close();
        }
    </script>
</body>
</html>
