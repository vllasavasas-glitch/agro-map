<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgroMap — Мої поля</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a2e1a;
      color: #e8f5e9;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #1b3a1b;
      border-bottom: 2px solid #4caf50;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    header .logo { font-size: 22px; }
    header h1 { font-size: 16px; font-weight: 700; color: #81c784; }
    header .subtitle { font-size: 11px; color: #66bb6a; margin-top: 1px; }
    .mode-bar {
      background: #1b3a1b;
      padding: 6px 14px;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .mode-btn {
      padding: 5px 12px;
      border: 1.5px solid #4caf50;
      border-radius: 20px;
      background: transparent;
      color: #81c784;
      font-size: 12px;
      cursor: pointer;
      transition: all .2s;
    }
    .mode-btn.active, .mode-btn:hover { background: #4caf50; color: #fff; }
    #map { flex: 1; width: 100%; }
    .bottom-panel {
      background: #1b3a1b;
      border-top: 2px solid #4caf50;
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex-shrink: 0;
    }
    .field-row { display: flex; gap: 8px; align-items: center; }
    .field-row input, .field-row select {
      flex: 1;
      padding: 8px 10px;
      background: #2e4d2e;
      border: 1.5px solid #4caf50;
      border-radius: 8px;
      color: #e8f5e9;
      font-size: 13px;
    }
    .field-row input::placeholder { color: #5a8a5a; }
    .area-display { font-size: 12px; color: #81c784; text-align: center; }
    .area-display span { font-weight: 700; color: #a5d6a7; }
    .btn-save {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #388e3c, #4caf50);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .2s;
    }
    .btn-save:disabled { opacity: .4; cursor: default; }
    .btn-save:not(:disabled):hover { opacity: .85; }
    .hint { font-size: 11px; color: #5a8a5a; text-align: center; }
    .leaflet-popup-content-wrapper {
      background: #1b3a1b;
      color: #e8f5e9;
      border: 1px solid #4caf50;
      border-radius: 8px;
    }
    .leaflet-popup-tip { background: #1b3a1b; }
    .leaflet-popup-content { font-size: 13px; line-height: 1.6; }
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(30px);
      background: #388e3c;
      color: #fff;
      padding: 8px 18px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: all .3s;
      pointer-events: none;
      z-index: 9999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* Іконка культури на полі */
    .crop-label {
      background: transparent;
      border: none;
      text-align: center;
      pointer-events: none;
    }
    .crop-label-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8));
    }
    .crop-emoji { font-size: 28px; line-height: 1; transition: opacity .3s; }
    .crop-name-tag {
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 10px;
      white-space: nowrap;
      letter-spacing: .3px;
    }

    /* Панель синхронізації */
    .sync-bar {
      background: #1b3a1b;
      border-bottom: 1px solid #2e4d2e;
      padding: 5px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      font-size: 11px;
    }
    .sync-status { color: #66bb6a; display: flex; align-items: center; gap: 5px; }
    .sync-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4caf50;
    }
    .sync-dot.offline { background: #e57373; }
    .btn-sync {
      padding: 3px 10px;
      background: transparent;
      border: 1px solid #4caf50;
      border-radius: 12px;
      color: #81c784;
      font-size: 11px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">🌾</div>
  <div>
    <h1>AgroMap</h1>
    <div class="subtitle">Управління полями</div>
  </div>
</header>

<!-- Панель стану синхронізації -->
<div class="sync-bar">
  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">Завантаження полів...</span>
  </div>
  <button class="btn-sync" onclick="loadFieldsFromServer()">🔄 Оновити</button>
</div>

<div class="mode-bar">
  <button class="mode-btn active" id="btn-draw" onclick="setMode('draw')">✏️ Малювати</button>
  <button class="mode-btn" id="btn-view" onclick="setMode('view')">👁 Переглянути</button>
  <button class="mode-btn" id="btn-clear" onclick="clearCurrent()">🗑 Очистити</button>
</div>

<div id="map"></div>

<div class="bottom-panel">
  <div class="field-row">
    <input type="text" id="fieldName" placeholder="Назва поля (наприклад: Північ-1)" />
    <select id="cropType">
      <option value="">Культура</option>
      <option value="wheat">🌾 Пшениця</option>
      <option value="corn">🌽 Кукурудза</option>
      <option value="sunflower">🌻 Соняшник</option>
      <option value="rapeseed">🟡 Ріпак</option>
      <option value="soy">🫘 Соя</option>
      <option value="barley">🌿 Ячмінь</option>
      <option value="fallow">⬜ Пар</option>
    </select>
  </div>
  <div class="area-display" id="areaDisplay">Площа: <span>—</span> га</div>
  <button class="btn-save" id="saveBtn" onclick="saveField()" disabled>💾 Зберегти поле</button>
  <div class="hint" id="hintText">Натисніть на карту щоб почати малювати поле</div>
</div>

<div id="toast"></div>

<script>
// ── Ініціалізація Telegram WebApp ──
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.expand();
  tg.ready();
}

// ── Ключ для CloudStorage (синхронізація з сервером бота) ──
const STORAGE_KEY = 'agromap_fields';

// ── Карта ──
const map = L.map('map', { zoomControl: true }).setView([47.5746, 34.4396], 14);

const satellite = L.tileLayer('https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', { attribution: '© Google', maxZoom: 21 });
const hybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { attribution: '© Google', maxZoom: 21 });
const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 });
hybrid.addTo(map);
L.control.layers({ '🛰 Супутник': satellite, '🛰+🗺 Гібрид': hybrid, '🗺 Карта': osm }).addTo(map);

// ── Налаштування культур ──
const CROPS = {
  wheat:     { emoji: '🌾', name: 'Пшениця',   color: '#f9a825', fill: '#fff176' },
  corn:      { emoji: '🌽', name: 'Кукурудза',  color: '#ff8f00', fill: '#ffe082' },
  sunflower: { emoji: '🌻', name: 'Соняшник',   color: '#e65100', fill: '#ffcc02' },
  rapeseed:  { emoji: '🌼', name: 'Ріпак',      color: '#c8b400', fill: '#ffe600' },
  soy:       { emoji: '🫘', name: 'Соя',         color: '#2e7d32', fill: '#a5d6a7' },
  barley:    { emoji: '🌿', name: 'Ячмінь',     color: '#00838f', fill: '#80deea' },
  fallow:    { emoji: '⬜', name: 'Пар',         color: '#757575', fill: '#e0e0e0' },
  '':        { emoji: '📍', name: 'Невідомо',   color: '#4caf50', fill: '#81c784' },
};

const ICON_HIDE_ZOOM = 15;
let pts = [], currentPoly = null, savedFields = [], mode = 'draw';
let tempMarkers = [], fieldLayers = [];

// ── Утиліти ──
function polyCenter(pts) {
  const lat = pts.reduce((s, p) => s + p[0], 0) / pts.length;
  const lng = pts.reduce((s, p) => s + p[1], 0) / pts.length;
  return [lat, lng];
}

function makeCropIcon(crop) {
  const c = CROPS[crop] || CROPS[''];
  return L.divIcon({
    className: 'crop-label',
    html: `<div class="crop-label-inner">
             <div class="crop-emoji">${c.emoji}</div>
             <div class="crop-name-tag">${c.name}</div>
           </div>`,
    iconSize: [60, 48],
    iconAnchor: [30, 24],
  });
}

const iconLayer = L.layerGroup().addTo(map);

function updateIconVisibility() {
  const z = map.getZoom();
  if (z >= ICON_HIDE_ZOOM) { if (map.hasLayer(iconLayer)) map.removeLayer(iconLayer); }
  else { if (!map.hasLayer(iconLayer)) iconLayer.addTo(map); }
}
map.on('zoom', updateIconVisibility);

function drawSavedField(field) {
  const c = CROPS[field.crop] || CROPS[''];
  const poly = L.polygon(field.pts, {
    color: c.color, fillColor: c.fill, fillOpacity: 0.38, weight: 2.5,
  }).addTo(map);

  const popupHtml = `
    <b>${c.emoji} ${field.name}</b><br>
    🌱 ${c.name}<br>
    📐 Площа: <b>${field.area} га</b><br>
    🕒 ${field.date}
  `;
  poly.bindPopup(popupHtml);

  const center = polyCenter(field.pts);
  const marker = L.marker(center, {
    icon: makeCropIcon(field.crop), interactive: false, zIndexOffset: 100,
  }).addTo(iconLayer);

  fieldLayers.push({ field, poly, marker });
  updateIconVisibility();
}

// ── Синхронізація: ЗАВАНТАЖЕННЯ полів ──
// Спочатку пробуємо Telegram CloudStorage (зберігається на серверах Telegram)
// Як резерв — localStorage
function loadFieldsFromServer() {
  setSyncStatus('loading');

  if (tg?.CloudStorage) {
    tg.CloudStorage.getItem(STORAGE_KEY, (err, value) => {
      if (!err && value) {
        try {
          const fields = JSON.parse(value);
          applyFields(fields);
          setSyncStatus('online', `Синхронізовано (${fields.length} полів)`);
        } catch(e) {
          fallbackToLocal();
        }
      } else {
        fallbackToLocal();
      }
    });
  } else {
    fallbackToLocal();
  }
}

function fallbackToLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const fields = JSON.parse(raw);
      applyFields(fields);
      setSyncStatus('local', `Локально (${fields.length} полів)`);
    } else {
      setSyncStatus('empty', 'Полів немає — намалюйте перше');
    }
  } catch(e) {
    setSyncStatus('offline', 'Помилка завантаження');
  }
}

function applyFields(fields) {
  // Очищаємо існуючі шари
  fieldLayers.forEach(fl => {
    map.removeLayer(fl.poly);
    iconLayer.removeLayer(fl.marker);
  });
  fieldLayers = [];
  savedFields = fields;
  fields.forEach(f => drawSavedField(f));
}

// ── Синхронізація: ЗБЕРЕЖЕННЯ полів ──
function persistFields() {
  const data = JSON.stringify(savedFields);

  // Спочатку — Telegram CloudStorage (зберігається між сесіями на серверах Telegram)
  if (tg?.CloudStorage) {
    tg.CloudStorage.setItem(STORAGE_KEY, data, (err) => {
      if (!err) {
        setSyncStatus('online', `Збережено (${savedFields.length} полів)`);
      }
    });
  }

  // Завжди також в localStorage як резерв
  try { localStorage.setItem(STORAGE_KEY, data); } catch(e) {}
}

// ── Статус синхронізації ──
function setSyncStatus(state, text) {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  dot.className = 'sync-dot';
  if (state === 'online') { dot.style.background = '#4caf50'; }
  else if (state === 'local') { dot.style.background = '#ffa726'; }
  else if (state === 'offline' || state === 'loading') { dot.style.background = '#e57373'; }
  else { dot.style.background = '#78909c'; }
  label.textContent = text || '';
}

// ── Малювання ──
map.on('click', (e) => {
  if (mode !== 'draw') return;
  pts.push([e.latlng.lat, e.latlng.lng]);

  const m = L.circleMarker([e.latlng.lat, e.latlng.lng], {
    radius: 5, color: '#4caf50', fillColor: '#a5d6a7', fillOpacity: 1, weight: 2
  }).addTo(map);
  tempMarkers.push(m);

  if (currentPoly) map.removeLayer(currentPoly);
  if (pts.length >= 2) {
    currentPoly = L.polygon(pts, {
      color: '#4caf50', fillColor: '#81c784', fillOpacity: 0.3,
      weight: 2, dashArray: '6,4'
    }).addTo(map);
  }

  updateAreaDisplay();
  updateHint();
  checkSaveBtn();
});

map.locate({ setView: true, maxZoom: 15 });
map.on('locationfound', e => {
  L.circleMarker(e.latlng, {
    radius: 8, color: '#1565c0', fillColor: '#42a5f5', fillOpacity: 1
  }).addTo(map).bindPopup('📍 Ви тут').openPopup();
});

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${m}`).classList.add('active');
  document.getElementById('hintText').textContent =
    m === 'view' ? 'Натисніть на поле щоб побачити інформацію' : hints()[0];
}

function hints() {
  return [
    'Натисніть на карту щоб почати малювати поле',
    'Додайте ще одну точку...',
    'Ще одна точка — і поле замкнеться',
    `${pts.length} точок. Продовжуйте або збережіть`,
  ];
}

function clearCurrent() {
  pts = [];
  tempMarkers.forEach(m => map.removeLayer(m));
  tempMarkers = [];
  if (currentPoly) { map.removeLayer(currentPoly); currentPoly = null; }
  document.getElementById('areaDisplay').innerHTML = 'Площа: <span>—</span> га';
  checkSaveBtn();
  updateHint();
  showToast('Очищено ✓');
}

function calcArea(pts) {
  if (pts.length < 3) return 0;
  const R = 6371000;
  let area = 0;
  const n = pts.length;
  for (let i = 0; i < n; i++) {
    const [lat1, lon1] = pts[i];
    const [lat2, lon2] = pts[(i+1) % n];
    const φ1 = lat1 * Math.PI/180, φ2 = lat2 * Math.PI/180;
    const λ2 = lon2 * Math.PI/180, λ1 = lon1 * Math.PI/180;
    area += (λ2 - λ1) * (2 + Math.sin(φ1) + Math.sin(φ2));
  }
  return ((Math.abs(area) * R * R / 2) / 10000).toFixed(2);
}

function updateAreaDisplay() {
  document.getElementById('areaDisplay').innerHTML = `Площа: <span>${calcArea(pts)}</span> га`;
}

function updateHint() {
  const h = hints();
  document.getElementById('hintText').textContent = h[Math.min(pts.length, h.length - 1)];
}

function checkSaveBtn() {
  const ok = document.getElementById('fieldName').value.trim().length > 0 && pts.length >= 3;
  document.getElementById('saveBtn').disabled = !ok;
}
document.getElementById('fieldName').addEventListener('input', checkSaveBtn);

function saveField() {
  const name = document.getElementById('fieldName').value.trim();
  const crop = document.getElementById('cropType').value;
  if (!name) return showToast('⚠️ Введіть назву поля');
  if (pts.length < 3) return showToast('⚠️ Намалюйте поле (мін. 3 точки)');

  const area = calcArea(pts);
  const now = new Date().toLocaleDateString('uk-UA');
  const field = { name, crop, pts: [...pts], area, date: now, id: Date.now() };

  savedFields.push(field);

  // 1) Зберегти локально + в CloudStorage
  persistFields();

  // 2) Надіслати боту — бот збереже в свою БД і відповість підтвердженням
  if (tg?.sendData) {
    tg.sendData(JSON.stringify(field));
    // WebApp закривається після sendData — поле вже намальоване
  } else {
    // Режим браузера без Telegram — просто показуємо тост
    drawSavedField(field);
    showToast(`✅ ${name} (${area} га) збережено`);
  }

  clearCurrent();
  document.getElementById('fieldName').value = '';
  document.getElementById('cropType').value = '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Старт ──
loadFieldsFromServer();
</script>
</body>
</html>
